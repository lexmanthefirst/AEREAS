services:
  db:
    image: postgres:18.1-bookworm
    container_name: acrev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: acrev_user
      POSTGRES_PASSWORD: acrev_password
      POSTGRES_DB: acrev_db
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5435:5432"
    volumes:
      - acrev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acrev_user -d acrev_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: acrev_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - acrev_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: acrev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acrev_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Override host-facing defaults so containers talk to each other.
      DATABASE_URL: postgresql+asyncpg://acrev_user:acrev_password@db:5432/acrev_db
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_BUCKET_NAME: documents
    ports:
      - "8000:8000"

volumes:
  acrev_pgdata:
  acrev_minio_data:
